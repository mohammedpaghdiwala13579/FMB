<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#f4ede5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Chattogram Tiffin">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="https://i.ibb.co.com/qLsxHhDf/logo-color.png">
  <title>Chattogram • Daily Tiffin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Noto+Naskh+Arabic:wght@500;600&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f4ede5;
      font-family: 'Inter', sans-serif;
      color: #2b231c;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
    }

    .app-wrapper {
      max-width: 680px;
      width: 100%;
      margin: 0 auto;
      background: transparent;
      position: relative;
    }

    /* LOADING SCREEN */
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #f8f2e9 0%, #efe3d6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      transition: opacity 0.65s cubic-bezier(0.2, 0.9, 0.4, 1.1), visibility 0.65s;
    }

    .loading-screen.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loading-card {
      background: rgba(255, 252, 245, 0.96);
      backdrop-filter: blur(2px);
      border-radius: 56px;
      padding: 2rem 2rem 2.2rem;
      width: 86%;
      max-width: 320px;
      text-align: center;
      box-shadow: 0 25px 45px -12px rgba(45, 30, 20, 0.25), 0 0 0 1px rgba(235, 210, 175, 0.4) inset;
      animation: gentleFloat 2.2s infinite ease-in-out;
    }

    @keyframes gentleFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
    }

    .loading-logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.2rem;
      background: #fff1e2;
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loading-logo img {
      width: 60px;
      height: 60px;
      object-fit: contain;
    }

    .loading-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.85rem;
      font-weight: 800;
      color: #3b2c1d;
      margin-bottom: 0.25rem;
    }

    .loading-sub {
      font-family: 'Noto Naskh Arabic', serif;
      font-size: 0.85rem;
      color: #b47c44;
      margin-bottom: 1.5rem;
      border-top: 1px dashed #eedbc8;
      display: inline-block;
      padding-top: 6px;
    }

    .spinner-elegant {
      margin: 1rem 0 0.9rem;
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .dot {
      width: 11px;
      height: 11px;
      background: #c98f4b;
      border-radius: 50%;
      display: inline-block;
      animation: bounce 1.2s infinite ease-in-out both;
    }
    .dot:nth-child(1) { animation-delay: -0.32s; background: #a57139; }
    .dot:nth-child(2) { animation-delay: -0.16s; background: #c68c46; }
    .dot:nth-child(3) { background: #e2a458; animation-delay: 0s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1.1); opacity: 1; }
    }

    .loading-message {
      font-size: 0.8rem;
      font-weight: 500;
      color: #7c6043;
      background: #fff7ed;
      display: inline-block;
      padding: 6px 14px;
      border-radius: 60px;
      margin-top: 12px;
    }

    .loading-quote {
      font-size: 0.65rem;
      color: #b4946e;
      margin-top: 1.2rem;
      font-style: italic;
      border-top: 1px solid #eedbc8;
      padding-top: 12px;
      display: inline-block;
    }

    /* MAIN UI */
    .one-page-box {
      width: 100%;
      background: transparent;
      display: flex;
      flex-direction: column;
      gap: 6px;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .one-page-box.visible {
      opacity: 1;
    }

    /* HEADER WITH BACKGROUND IMAGE - LARGER, 80% OPACITY IMAGE, TEXT COLOR ADJUSTED */
    .micro-header {
      background: #e8dfd3;
      border-radius: 40px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      border: 1px solid #dbcbb8;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
      background-image: url('https://i.ibb.co.com/7d5GwH85/Chat-GPT-Image-Jun-9-2026-01-24-33-PM.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .micro-header::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(232, 223, 211, 0.2);
      backdrop-filter: blur(1px);
      z-index: 0;
      border-radius: 40px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
      position: relative;
      z-index: 2;
    }

    .logo-micro {
      width: 70px;
      height: 70px;
      border-radius: 20px;
      object-fit: contain;
      background: rgba(255, 251, 245, 0.9);
      padding: 5px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.15);
    }

    .title-micro {
      text-align: left;
      line-height: 1.3;
      position: relative;
      z-index: 2;
    }

    .chatt-micro {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 800;
      color: #1e140c;
      text-shadow: 0 2px 5px rgba(255, 250, 240, 0.9);
      letter-spacing: 0.3px;
    }

    .arabic-micro {
      font-family: 'Noto Naskh Arabic', serif;
      font-size: 0.8rem;
      font-weight: 600;
      color: #3d2b18;
      text-shadow: 0 1px 4px rgba(255, 245, 230, 0.9);
    }

    .install-btn {
      background: #8b6a47;
      border: none;
      padding: 12px 22px;
      border-radius: 50px;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      color: white;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 6px 14px rgba(0,0,0,0.25);
      white-space: nowrap;
      position: relative;
      z-index: 5;
      backdrop-filter: blur(4px);
      background: rgba(107, 78, 49, 0.92);
      border: 1px solid rgba(255,255,200,0.3);
    }

    .install-btn:hover {
      background: #DC143C;
      transform: scale(1.02);
    }

    .install-btn:active {
      transform: scale(0.98);
    }

    .install-btn.hidden {
      display: none;
    }

    .install-icon {
      font-size: 1.1rem;
    }

    /* FOOTER WITH BACKGROUND IMAGE - 80% OPACITY, TEXT ADJUSTED */
    .tiffin-footer {
      background: #e8dfd3;
      border-radius: 28px;
      padding: 10px 14px;
      border: 1px solid #dbcbb8;
      margin-top: 4px;
      position: relative;
      overflow: hidden;
      background-image: url('https://i.ibb.co.com/xqxmh07B/Chat-GPT-Image-Jun-9-2026-01-24-44-PM.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .tiffin-footer::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(232, 223, 211, 0.2);
      backdrop-filter: blur(0.6px);
      z-index: 0;
      border-radius: 28px;
    }

    .rules-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.0rem;
      font-weight: 1000;
      color: #2f2418;
      text-align: left;
      margin-bottom: 6px;
      position: relative;
      z-index: 2;
      text-shadow: 0 1px 4px rgba(255, 250, 240, 0.9);
      letter-spacing: 0.3px;
    }

    .rules-wrap {
      display: flex;
      flex-wrap: wrap;
      justify-content: left;
      gap: 6px 12px;
      position: relative;
      z-index: 2;
    }

    .rule {
      background: rgba(253, 247, 239, 0.8);
      backdrop-filter: blur(3px);
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.65rem;
      font-weight: 600;
      color: #3b2a19;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      white-space: nowrap;
      border: 1px solid rgba(255, 250, 235, 0.7);
      text-shadow: 0 1px 2px white;
    }

    .rule strong {
      font-weight: 700;
      color: #8b5e34;
    }

    /* GRID - fixed, no outer scroll */
    .grid-2x3 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
    }

    .flip-card {
      background: transparent;
      perspective: 1000px;
      cursor: pointer;
      min-height: 140px;
      height: auto;
    }

    .flip-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.35s ease;
      transform-style: preserve-3d;
      border-radius: 18px;
      min-height: 140px;
    }

    .flip-card.flipped .flip-card-inner {
      transform: rotateY(180deg);
    }

    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 18px;
      padding: 7px 8px 6px 8px;
      display: flex;
      flex-direction: column;
      background: #fffffffb;
      border: 1px solid #dfceb6;
      box-shadow: 0 2px 5px rgba(0,0,0,0.02);
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    .card-back {
      transform: rotateY(180deg);
      background: #fefaf4;
    }

    /* ===== SCROLLABLE CONTENT INSIDE CARD ===== */
    .menu-text {
      font-size: 0.9rem;
      line-height: 1.35;
      font-weight: 700;
      color: #33271e;
      white-space: pre-line;
      word-break: break-word;
      flex: 1;
      margin: 4px 0 3px 0;
      overflow-y: auto;
      max-height: 100%;
      scrollbar-width: thin;
      padding-right: 2px;
    }
    .menu-text::-webkit-scrollbar {
      width: 3px;
    }
    .menu-text::-webkit-scrollbar-track {
      background: #f0e2d2;
      border-radius: 6px;
    }
    .menu-text::-webkit-scrollbar-thumb {
      background: #c9a87c;
      border-radius: 6px;
    }

    .extra-detail {
      font-size: 0.85rem;
      line-height: 1.3;
      background: #fffaf2;
      padding: 5px 6px;
      border-radius: 14px;
      border: 1px solid #f0e2d2;
      flex: 1;
      overflow-y: auto;
      font-weight: 500;
      color: #4f3926;
      white-space: pre-line;
      scrollbar-width: thin;
    }
    .extra-detail::-webkit-scrollbar {
      width: 3px;
    }
    .extra-detail::-webkit-scrollbar-track {
      background: #f0e2d2;
      border-radius: 6px;
    }
    .extra-detail::-webkit-scrollbar-thumb {
      background: #c9a87c;
      border-radius: 6px;
    }

    .day-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      border-bottom: 1px solid #f0e2d2;
      padding-bottom: 4px;
      margin-bottom: 5px;
      flex-wrap: wrap;
      gap: 3px;
      flex-shrink: 0;
    }

    .day-name {
      font-family: 'Playfair Display', serif;
      font-size: 0.6rem;
      font-weight: 1000;
      color: #b07d48;
    }

    .date-chip {
      font-size: 0.8rem;
      font-weight: 800;
      background: #f0e6db;
      padding: 2px 8px;
      border-radius: 30px;
      color: #7a5b3c;
      white-space: nowrap;
    }

    .extra-head {
      font-family: 'Playfair Display', serif;
      font-size: 0.68rem;
      font-weight: 700;
      color: #9b6e42;
      border-left: 2px solid #dbbc9a;
      padding-left: 6px;
      margin-bottom: 5px;
      flex-shrink: 0;
    }

    .tap-hint, .back-hint {
      font-size: 0.45rem;
      color: #c7ab89;
      text-align: right;
      margin-top: 4px;
      flex-shrink: 0;
    }

    /* ── HIGHLIGHTED MENU LINES (from Google Sheets cell colors) ── */
    .menu-line {
      display: block;
      border-radius: 5px;
      padding: 0 3px;
      margin: 1px 0;
      line-height: 1.4;
    }
    .menu-line.has-highlight {
      padding: 1px 6px;
      border-radius: 6px;
      font-weight: 700;
      /* background-color is set inline from the sheet's cell bg color */
    }

    /* ── SPEAK BUTTON ── */
    .card-bottom-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 4px;
      flex-shrink: 0;
    }
    .speak-btn {
      background: none;
      border: 1px solid #e2ccb0;
      border-radius: 30px;
      padding: 3px 9px 3px 7px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.48rem;
      font-weight: 600;
      color: #9b7048;
      font-family: 'Inter', sans-serif;
      transition: background 0.18s, border-color 0.18s, transform 0.1s;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .speak-btn:active { transform: scale(0.93); }
    .speak-btn:hover  { background: #fdf3e7; border-color: #c9a060; }
    .speak-btn svg {
      width: 10px; height: 10px;
      flex-shrink: 0;
      transition: fill 0.18s;
    }

    /* Speaking state — wave bars on the button */
    .speak-btn.speaking {
      background: #fff4e0;
      border-color: #c9a060;
      color: #7a5020;
    }
    .speak-btn.speaking .speak-icon { display: none; }
    .speak-btn.loading  .speak-icon { display: none; }
    .speak-btn .speak-wave { display: none; }
    .speak-btn.speaking .speak-wave,
    .speak-btn.loading  .speak-wave { display: flex; align-items: flex-end; gap: 2px; height: 10px; }
    .speak-wave span {
      display: block;
      width: 2.5px;
      border-radius: 2px;
      background: #c9a060;
      animation: waveBar 0.7s ease-in-out infinite alternate;
    }
    .speak-wave span:nth-child(1) { height: 4px;  animation-delay: 0s; }
    .speak-wave span:nth-child(2) { height: 8px;  animation-delay: 0.12s; }
    .speak-wave span:nth-child(3) { height: 6px;  animation-delay: 0.24s; }
    .speak-wave span:nth-child(4) { height: 10px; animation-delay: 0.36s; }
    .speak-wave span:nth-child(5) { height: 5px;  animation-delay: 0.18s; }
    @keyframes waveBar {
      from { transform: scaleY(0.4); opacity: 0.6; }
      to   { transform: scaleY(1);   opacity: 1;   }
    }

    /* Card glow while speaking */
    .flip-card.speaking .card-front {
      box-shadow: 0 0 0 2px #c9a060, 0 4px 18px rgba(180,124,68,0.22);
    }

    /* ensure cards have consistent height and content area grows */
    .card-front, .card-back {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    @media (max-width: 520px) {
      .flip-card { min-height: 150px; }
      .menu-text { font-size: 0.85rem; }
      .extra-detail { font-size: 0.7rem; }
      .install-btn { padding: 10px 16px; font-size: 0.8rem; }
      .chatt-micro { font-size: 1.5rem; }
      .logo-micro { width: 54px; height: 54px; }
      .micro-header { padding: 16px 18px; }
    }

    @media (max-width: 400px) {
      .flip-card { min-height: 145px; }
      .menu-text { font-size: 0.8rem; }
      .install-btn { padding: 8px 14px; font-size: 0.7rem; }
      .logo-micro { width: 48px; height: 48px; }
      .chatt-micro { font-size: 1.3rem; }
      .arabic-micro { font-size: 0.7rem; }
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .grid-2x3 .flip-card { animation: fadeSlideUp 0.4s ease backwards; }
    .grid-2x3 .flip-card:nth-child(1) { animation-delay: 0.02s; }
    .grid-2x3 .flip-card:nth-child(2) { animation-delay: 0.05s; }
    .grid-2x3 .flip-card:nth-child(3) { animation-delay: 0.08s; }
    .grid-2x3 .flip-card:nth-child(4) { animation-delay: 0.11s; }
    .grid-2x3 .flip-card:nth-child(5) { animation-delay: 0.14s; }
    .grid-2x3 .flip-card:nth-child(6) { animation-delay: 0.17s; }
  </style>
</head>
<body>
<div class="app-wrapper">
  <!-- Loading overlay -->
  <div id="beautifulLoading" class="loading-screen">
    <div class="loading-card">
      <div class="loading-logo">
        <img src="https://i.ibb.co.com/qLsxHhDf/logo-color.png" alt="logo" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2260%22 height=%2260%22%3E%3Crect fill=%22%23d9c7b0%22 width=%2260%22 height=%2260%22 rx=%2218%22/%3E%3Ctext x=%2230%22 y=%2238%22 text-anchor=%22middle%22 fill=%22%234a3728%22 font-size=%2222%22%3EC%3C/text%3E%3C/svg%3E'">
      </div>
      <div class="loading-title">Chattogram</div>
      <div class="loading-sub">الحمد لله والشكر لوليه</div>
      <div class="spinner-elegant"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
      <div class="loading-message" id="loadingStatusMsg">Fetching today's tiffin...</div>
      <div class="loading-quote">✨ From our kitchen to your table ✨</div>
    </div>
  </div>

  <!-- Main App -->
  <div class="one-page-box" id="mainContent">
    <div class="micro-header">
      <div class="header-left">
        <img src="https://i.ibb.co.com/qLsxHhDf/logo-color.png" alt="logo" class="logo-micro" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2238%22 height=%2238%22%3E%3Crect fill=%22%23d4c3af%22 width=%2238%22 height=%2238%22 rx=%2212%22/%3E%3Ctext x=%2219%22 y=%2224%22 text-anchor=%22middle%22 fill=%22%234a3728%22 font-size=%2212%22%3EC%3C/text%3E%3C/svg%3E'">
        <div class="title-micro">
          <div class="chatt-micro">Chattogram</div>
          <div class="arabic-micro">الحمد لله والشكر لوليه</div>
        </div>
      </div>
      <button id="installAppBtn" class="install-btn">
        Install
      </button>
    </div>

    <!-- Fixed grid (no outer scroll wrapper) -->
    <div class="grid-2x3" id="compactFlipGrid">
      <div class="loading-state" style="grid-column: span 2; background:#fff9f0; text-align:center; padding:20px;">
        <div class="mini-spin"></div>
        <span style="font-size:0.65rem;">Loading menu...</span>
      </div>
    </div>

    <div class="tiffin-footer">
      <div class="rules-title">Tiffin Rules</div>
      <div class="rules-wrap">
        <span class="rule">🧼 Wash & dry</span>
        <span class="rule">🔥 <strong>Do NOT heat</strong></span>
        <span class="rule">💳 FMB Card</span>
        <span class="rule">⏰ Before 10:00 AM</span>
      </div>
    </div>
  </div>
</div>

<script>
  // ================= PWA INSTALL LOGIC =================
  let deferredPrompt = null;
  const installBtn = document.getElementById('installAppBtn');

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    if (installBtn) {
      installBtn.style.display = 'flex';
      console.log('Install button shown');
    }
  });

  if (installBtn) {
    installBtn.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        console.log(`User ${outcome}`);
        deferredPrompt = null;
        installBtn.style.display = 'none';
      } else {
        alert('To install this app, tap the Share button and select "Add to Home Screen"');
      }
    });
  }

  // ================= SERVICE WORKER =================
  // The ?v= hash below is auto-replaced by GitHub Actions on every push.
  // You never need to touch this manually.
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js?v=BUILD_HASH', { updateViaCache: 'none' })
        .then(reg => {
          console.log('SW registered:', reg.scope);
          reg.update();
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'activated') {
                console.log('New SW activated — reloading for fresh content');
                window.location.reload();
              }
            });
          });
        }).catch(err => console.log('SW registration failed:', err));

      // Reload when SW signals it has taken over an already-open tab
      navigator.serviceWorker.addEventListener('message', (event) => {
        if (event.data && event.data.type === 'SW_ACTIVATED') {
          console.log('SW signalled activation — reloading');
          window.location.reload();
        }
      });
    });
  }

  // ========== MENU FETCH & RENDER ==========
  const MENU_API = "https://script.google.com/macros/s/AKfycbzVZzn2MXO5etBU24Xz1UyRlWPmqN2a7relpBlJacwKuK98qzCcIELFE9UrCeLow5go/exec";

  function escapeText(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  function escapeWithBreaks(str) {
    if (!str) return '';
    return escapeText(str).replace(/\n/g, '<br>');
  }

  async function fetchMenuDataWithProgress(statusCallback) {
    try {
      statusCallback('Connecting to kitchen...');
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 8000);
      const resp = await fetch(MENU_API, { signal: controller.signal });
      clearTimeout(timeoutId);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      statusCallback('Unfolding today\'s recipes...');
      const json = await resp.json();
      if (json && json.error) throw new Error(json.message);
      if (Array.isArray(json) && json.length) {
        statusCallback('✨ Menu ready! ✨');
        return json.map(row => ({
          day: row.day || '',
          month: row.month || '',
          date: row.date || '',
          menu: row.menu || '',
          extra: row.extra || '',
          menuColors: Array.isArray(row.menuColors) ? row.menuColors : []
        }));
      }
      return [];
    } catch (err) {
      console.warn(err);
      throw err;
    }
  }

  // ══════════════════════════════════════════════════════════
  // SPEAK SYSTEM
  // Flow: tap 🔊 button → call Claude API to convert Banglish/
  // menu text into natural spoken English → speak via browser TTS.
  // The API call is cached per card so repeat taps are instant.
  // ══════════════════════════════════════════════════════════

  const speakCache = {};   // cardIndex → natural English string
  let currentUtterance = null;
  let currentSpeakBtn  = null;
  let currentFlipCard  = null;

  function stopSpeaking() {
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    if (currentSpeakBtn)  { currentSpeakBtn.classList.remove('speaking', 'loading'); }
    if (currentFlipCard)  { currentFlipCard.classList.remove('speaking'); }
    currentUtterance = null;
    currentSpeakBtn  = null;
    currentFlipCard  = null;
  }

  async function fetchNaturalSpeech(dayText, dateText, menuText) {
    // Ask Claude to turn Banglish food names into a natural spoken English sentence,
    // including the day name and date so the listener knows which day's menu it is.
    const systemPrompt =
      'You convert a Bengali tiffin menu (written in Roman/English letters, called Banglish) ' +
      'into a single natural English sentence for text-to-speech. ' +
      'Always begin with the day and date (e.g. "On Saturday, June 14th, ..."). ' +
      'Then describe each dish warmly. ' +
      'Output only the final sentence — no explanation, no preamble, no markdown. ' +
      'Example input — Day: Saturday, Date: June 14, Menu: "Khichuri, Begun Bhaja, Doi" ' +
      'Example output: "On Saturday, June 14th, the menu features khichdi — a comforting rice and lentil dish — crispy fried eggplant, and cool yogurt." ' +
      'Keep it under 50 words.';

    const userMsg = `Day: ${dayText}\nDate: ${dateText || 'not specified'}\nMenu: ${menuText}`;

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 120,
        system: systemPrompt,
        messages: [{ role: 'user', content: userMsg }]
      })
    });

    if (!resp.ok) throw new Error('API error ' + resp.status);
    const data = await resp.json();
    const text = (data.content || []).find(b => b.type === 'text');
    return text ? text.text.trim() : menuText;
  }

  function pickBestVoice() {
    const voices = window.speechSynthesis.getVoices();
    // Prefer premium / natural-sounding en-US voices
    const prefs = [
      v => /samantha|karen|moira|tessa/i.test(v.name),          // Apple natural
      v => /google us english/i.test(v.name),                    // Google TTS
      v => /zira|david|mark/i.test(v.name),                     // Windows natural
      v => v.lang === 'en-US' && v.localService === false,       // cloud voice
      v => v.lang === 'en-US',
      v => v.lang.startsWith('en')
    ];
    for (const test of prefs) {
      const found = voices.find(test);
      if (found) return found;
    }
    return null;
  }

  function doSpeak(naturalText, btn, card) {
    if (!('speechSynthesis' in window)) {
      alert('Sorry, your browser does not support text-to-speech.');
      return;
    }
    window.speechSynthesis.cancel();

    const utter = new SpeechSynthesisUtterance(naturalText);
    utter.lang   = 'en-US';
    utter.rate   = 0.88;
    utter.pitch  = 1.05;
    utter.volume = 1;

    const voice = pickBestVoice();
    if (voice) utter.voice = voice;

    currentUtterance = utter;
    currentSpeakBtn  = btn;
    currentFlipCard  = card;

    btn.classList.remove('loading');
    btn.classList.add('speaking');
    card.classList.add('speaking');

    utter.onend = () => stopSpeaking();
    utter.onerror = () => stopSpeaking();

    window.speechSynthesis.speak(utter);

    // iOS Safari fix: speech can stall; nudge it
    const nudge = setInterval(() => {
      if (!window.speechSynthesis.speaking) { clearInterval(nudge); return; }
      window.speechSynthesis.pause();
      window.speechSynthesis.resume();
    }, 5000);
    utter.onend = () => { clearInterval(nudge); stopSpeaking(); };
    utter.onerror = () => { clearInterval(nudge); stopSpeaking(); };
  }

  async function handleSpeakTap(idx, dayText, dateText, menuRaw, btn, card) {
    // If already speaking this card — stop
    if (card.classList.contains('speaking')) { stopSpeaking(); return; }

    // Stop any other card speaking
    stopSpeaking();

    // Show loading wave
    btn.classList.add('loading');
    currentSpeakBtn = btn;
    currentFlipCard = card;

    let naturalText;
    try {
      if (speakCache[idx]) {
        naturalText = speakCache[idx];
      } else {
        naturalText = await fetchNaturalSpeech(dayText, dateText, menuRaw);
        speakCache[idx] = naturalText;
      }
    } catch (err) {
      console.warn('Claude API failed, using raw text:', err);
      // Graceful fallback: clean up the raw text as best we can
      const dateLabel = dateText ? ` ${dateText}` : '';
      naturalText = `On ${dayText}${dateLabel}, the menu includes: ${menuRaw.replace(/\n/g, ', ')}`;
    }

    // Voices may not be loaded yet on first call (especially iOS)
    if (window.speechSynthesis.getVoices().length === 0) {
      window.speechSynthesis.onvoiceschanged = () => {
        window.speechSynthesis.onvoiceschanged = null;
        doSpeak(naturalText, btn, card);
      };
    } else {
      doSpeak(naturalText, btn, card);
    }
  }

  // ══════════════════════════════════════════════════════════
  // RENDER CARDS
  // ══════════════════════════════════════════════════════════
  function renderCompactCards(menuItems) {
    const container = document.getElementById('compactFlipGrid');
    if (!container) return;
    container.innerHTML = '';

    for (let i = 0; i < 6; i++) {
      const source = (i < menuItems.length) ? menuItems[i] : null;
      let dayVal = "—", monthVal = "", dateVal = "",
          menuRaw = "Menu update soon",
          menuHtml = "Menu update soon",
          extraHtml = "Please check back later for delicious details.";

      let menuColors = [];
      if (source) {
        dayVal   = (source.day   && source.day.trim())   ? source.day   : "—";
        monthVal = (source.month && source.month.trim()) ? source.month : "";
        dateVal  = (source.date  && source.date.trim())  ? source.date  : "";
        menuRaw  = (source.menu  && source.menu.trim())  ? source.menu  : "Fresh daily dish";
        menuColors = Array.isArray(source.menuColors) ? source.menuColors : [];
        const rawExtra = (source.extra && source.extra.trim()) ? source.extra : "Prepared with authentic ingredients.";
        // Build menuHtml: one .menu-line span per line, with inline bg color if highlighted
        menuHtml = menuRaw.split('\n').map((line, li) => {
          const safeLine = escapeText(line);
          const color = (menuColors[li] || '').toString().trim().toLowerCase();
          // Treat white (#ffffff / #fff) and empty as no highlight
          const isWhite = !color || color === '#ffffff' || color === '#fff' || color === 'null';
          if (!isWhite) {
            // Slightly transparent so it looks like a highlight, not a solid block
            return `<span class="menu-line has-highlight" style="background-color:${color};">${safeLine}</span>`;
          }
          return `<span class="menu-line">${safeLine}</span>`;
        }).join('');
        extraHtml = escapeWithBreaks(rawExtra);
      } else {
        const genericDays = ["Saturday","Sunday","Monday","Tuesday","Wednesday","Thursday"];
        dayVal = genericDays[i % 6];
        menuHtml = '<span class="menu-line">Menu update soon</span>';
      }

      let dateDisplay = "";
      if (monthVal && dateVal) dateDisplay = `${escapeText(monthVal)} ${escapeText(dateVal)}`;
      else if (monthVal) dateDisplay = escapeText(monthVal);
      else if (dateVal)  dateDisplay = escapeText(dateVal);
      const safeDay = escapeText(dayVal);
      // Human-readable date label for TTS (e.g. "June 14")
      const dateTextForSpeech = dateDisplay.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');

      const flipCard = document.createElement('div');
      flipCard.className = 'flip-card';

      flipCard.innerHTML = `
        <div class="flip-card-inner">
          <div class="card-front">
            <div class="day-row">
              <span class="day-name">${safeDay}</span>
              ${dateDisplay ? `<span class="date-chip">${dateDisplay}</span>` : '<span class="date-chip">—</span>'}
            </div>
            <div class="menu-text">${menuHtml}</div>
            <div class="card-bottom-row">
              <button class="speak-btn" type="button" aria-label="Read menu aloud">
                <span class="speak-icon">
                  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M11 5L6 9H2v6h4l5 4V5z" fill="#c9a060"/>
                    <path d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke="#c9a060" stroke-width="2" stroke-linecap="round"/>
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14" stroke="#c9a060" stroke-width="2" stroke-linecap="round"/>
                  </svg>
                </span>
                <span class="speak-wave">
                  <span></span><span></span><span></span><span></span><span></span>
                </span>
                Read aloud
              </button>
              <span class="tap-hint">Tap for details</span>
            </div>
          </div>
          <div class="card-back">
            <div class="extra-head">Info</div>
            <div class="extra-detail">${extraHtml}</div>
            <div class="back-hint">↺ tap return</div>
          </div>
        </div>
      `;

      // Capture loop vars for closures
      const cardIdx  = i;
      const cardDay  = dayVal;
      const cardDate = dateTextForSpeech;
      const cardMenu = menuRaw;

      const speakBtn = flipCard.querySelector('.speak-btn');

      // Speak button — direct user gesture, works on all browsers/mobile
      speakBtn.addEventListener('click', function(e) {
        e.stopPropagation();   // don't flip the card
        handleSpeakTap(cardIdx, cardDay, cardDate, cardMenu, this, flipCard);
      });

      // Card click (anywhere except speak button) → flip
      flipCard.addEventListener('click', (e) => {
        e.stopPropagation();
        // Stop speaking when flipping to back
        if (!flipCard.classList.contains('flipped')) stopSpeaking();
        flipCard.classList.toggle('flipped');
      });

      container.appendChild(flipCard);
    }
  }

  async function initializeApp() {
    const loadingOverlay = document.getElementById('beautifulLoading');
    const mainUi = document.getElementById('mainContent');
    const statusSpan = document.getElementById('loadingStatusMsg');
    const updateStatus = (msg) => { if (statusSpan) statusSpan.innerText = msg; };
    try {
      const menuData = await fetchMenuDataWithProgress(updateStatus);
      updateStatus('Almost there...');
      await new Promise(resolve => setTimeout(resolve, 200));
      if (menuData && menuData.length > 0) renderCompactCards(menuData);
      else { const emptySlots = Array(6).fill(null); renderCompactCards(emptySlots); }
      if (loadingOverlay) {
        loadingOverlay.classList.add('hide');
        setTimeout(() => { if (loadingOverlay) loadingOverlay.style.display = 'none'; }, 700);
      }
      if (mainUi) mainUi.classList.add('visible');
    } catch (err) {
      updateStatus('Using local menu...');
      setTimeout(() => {
        const fallbackSlots = Array(6).fill(null);
        renderCompactCards(fallbackSlots);
        if (loadingOverlay) { loadingOverlay.classList.add('hide'); setTimeout(() => { if (loadingOverlay) loadingOverlay.style.display = 'none'; }, 600); }
        if (mainUi) mainUi.classList.add('visible');
      }, 500);
    }
  }

  window.addEventListener('DOMContentLoaded', () => {
    const mainBox = document.getElementById('mainContent');
    if (mainBox) mainBox.classList.remove('visible');
    initializeApp();
  });
</script>
